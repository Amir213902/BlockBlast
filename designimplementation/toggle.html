<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <title>Document</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        input[type=checkbox] {
            height: 0;
            width: 0;
            visibility: hidden;
        }

        label {
            cursor: pointer;
            width: 83px;
            height: 38px;
            background: #534DF3;
            display: block;
            border-radius: 100px;
            /* border-radius: 20px; */
            position: relative;
            box-shadow: inset 0px 3px 10px #00000055;
        }

        label:after {
            content: '';
            position: absolute;
            top: 50%;
            left: 5px;
            width: 33px;
            height: 33px;
            /* width: 80px; */
            /* height: 80px; */
            background: #fff;
            border-radius: 90px;
            transition: 0.3s;
            transform: translate(0, -50%);
        }

        input:checked+label {
            background: #4BCC4D;
        }

        input:checked+label:after {
            left: calc(100% - 5px);
            transform: translate(-100%, -50%);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>

<body>
    <input type="checkbox" onchange="handleClick()" id="switch" checked />
    <label for="switch"></label>

    <script>
        const switchs = document.getElementById('switch');
        function handleClick () {
            console.dir(switchs.checked)
        }
    </script>
</body>

</html>
