    <section class="settings" id="settingsId">
        <div class="settings_modal">
            <div class="settings_modal_header">
                <p class="settings_modal_header_headline">
                    SETTINGS
                </p>
                <button class="settings_modal_header_close" id="close">
                    <img src="./assets/Icon_Cross.svg" alt="">
                </button>
            </div>
            <div class="settings_modal_container">
                <div class="settings_modal_container_options">
                    <div class="settings_modal_container_options_item_switch music">
                        <img src="./assets/Icon_Music.svg" alt=""
                            class="settings_modal_container_options_item_switch_icon">
                        <div class="settings_modal_container_options_item_switch_toggle">
                            <input type="checkbox" onclick="handleClick()" id="switch-a" />
                            <label for="switch-a"></label>

                        </div>
                    </div>
                    <div class="settings_modal_container_options_item_switch sound">
                        <img src="./assets/Icon_Sound.svg" alt=""
                            class="settings_modal_container_options_item_switch_icon">
                        <div class="settings_modal_container_options_item_switch_toggle">
                            <input type="checkbox" onclick="handleClick()" id="switch-b" />
                            <label for="switch-b"></label>

                        </div>
                    </div>
                </div>
                <button class="settings_modal_container_go home" onclick="toggleModal()">
                    Home
                </button>
            </div>
        </div>
    </section>


    <section class="modal" onclick="toggleModal()" id="modal">
        <div class="modal_container">
            <p class="modal_container_headline">Are you sure you want to quit the game?</p>
            <div class="modal_container_navigations">
                <button onclick="redirect('game', 'home')" class="modal_container_navigations_btn yes">Yes</button>
                <button onclick="toggleSettings()" class="modal_container_navigations_btn no">No</button>
            </div>
        </div>
    </section>

    <script>
        const switchs_a = document.getElementById('switch-a');
        const switchs_b = document.getElementById('switch-b');
        const btnSettings = document.getElementById('settings');
        const btnClose = document.getElementById('close');
        const settings = document.getElementById('settingsId');
        const modal = document.getElementById('modal');
        function handleClick() {
            console.dir(switchs_a.checked)
            console.dir(switchs_b.checked)
        }
        const toggleModal = () => {
            modal.classList.toggle('open')
        }

        const toggleSettings = () => {
            settings.classList.toggle('open')
            console.log('a')
        }

        btnSettings.addEventListener('click', ()=>toggleSettings())

        btnClose.addEventListener('click', ()=>toggleSettings())

        const redirect = (word, page) => {
            const newPath = window.location.origin + window.location.pathname.replace(word, page)
            window.location.href = newPath
        }
