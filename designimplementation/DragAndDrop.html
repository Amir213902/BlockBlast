<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>METANIT.COM</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
        }

        #source {
            width: 150px;
            height: 150px;
            background-color: red;
            display: inline-block;
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .arena {
            display: grid;
            grid-template-columns: repeat(2, auto);
            gap: 10px;
            width: 400px;
            height: 400px;
            border: 1px dashed #ccc;
        }

        .arena_item {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border: 1px #ccc dashed;
            z-index: 2;
            &.active {
                background-color: red;
            }
        }
    </style>
</head>

<body>
    <div id="source"></div>
    <div class="arena" id="arena">
        <div class="arena_item" id="item"></div>
        <div class="arena_item" id="item"></div>
        <div class="arena_item" id="item"></div>
        <div class="arena_item" id="item"></div>

    </div>
    <script>
        const source = document.getElementById('source')
        const arena = document.getElementById('arena')
        const cells = document.querySelectorAll('.arena_item')
        function moveAt(pageX, pageY) {
            source.style.left = pageX - source.offsetWidth / 2 + 'px';
            source.style.top = pageY - source.offsetHeight / 2 + 'px';
        }
        function init() {
            arena.innerHTML = ''
        }

        source.addEventListener('touchmove', dragStart)

        function dragStart (event) {
            event.preventDefault();

            let touch = event.targetTouches[0];

            source.style.top = `${touch.pageY - (source.offsetHeight / 2) - 160}px`
            source.style.left = `${touch.pageX - (source.offsetWidth / 2)}px`

            cells.forEach(element => {
                if(source.getBoundingClientRect().top + source.offsetHeight / 2 > element.getBoundingClientRect().bottom ){
                    element.classList.add('active')
                }else{
                    element.classList.remove('active')
                }
            });
        }

        // init()

    </script>
</body>

</html>
