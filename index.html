<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%app-logo.svg" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000D4D" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BlockBlast" />
    <link rel="apple-touch-icon" href="%BASE_URL%app-logo.svg" />
    <title>BlockBlast - Puzzle Game</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register Service Worker for offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%BASE_URL%sw.js')
            .then(registration => {
              console.log('✓ Service Worker registered successfully');
              
              // Check for updates periodically
              setInterval(() => {
                registration.update();
              }, 60000); // Check every minute
            })
            .catch(error => {
              console.log('✗ Service Worker registration failed:', error);
            });
        });

        // Handle controller change (new SW activated)
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('✓ New Service Worker activated - app updated!');
        });
      } else {
        console.log('ℹ Service Worker not supported in this browser');
      }
    </script>
  </body>
</html>
